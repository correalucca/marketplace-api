spring.application.name=marketplace-api
server.port=8080

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.url=jdbc:h2:file:./data/marketplace_dev
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

api.security.jwt.secret=bWFya2V0cGxhY2UtYXBpLWp3dC1zZWNyZXQta2V5LTEyMzQ1Njc4OTA=
api.security.jwt.access-expiration=900000
api.security.jwt.refresh-expiration=604800000

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
